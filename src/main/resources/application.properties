server.port=${SERVER_PORT:8081}

# ============================
# DATABASE
# ============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/social_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:27042004}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================
# JPA / HIBERNATE
# ============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# ============================
# FILE UPLOAD
# ============================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:20MB}
file.upload-dir=${UPLOAD_DIR:uploads}

# ============================
# CONNECTION POOL (HikariCP)
# Tối ưu cho high-concurrency — vá điểm cổ chai connection starvation
# ============================
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:30}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:10}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:10000}

# ============================
# TOMCAT THREAD POOL
# Tối ưu cho high-concurrency — vá điểm cổ chai thread exhaustion
# ============================
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:200}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:100}
